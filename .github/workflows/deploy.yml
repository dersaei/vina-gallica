name: Deploy to Cloudflare Workers

on:
    push:
        branches:
            - main

jobs:
    deploy:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            deployments: write
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "24"

            - name: Install Doppler CLI
              run: |
                  sudo apt-get update -y
                  sudo apt-get install -y apt-transport-https ca-certificates curl gnupg
                  curl -sLf --retry 3 --tlsv1.2 --proto "=https" 'https://dl.doppler.com/linux/pub.gpg' | sudo apt-key add -
                  echo "deb https://dl.doppler.com/linux/deb stable main" | sudo tee /etc/apt/sources.list.d/doppler.sources.list
                  sudo apt-get update -y
                  sudo apt-get install -y doppler

            - name: Install dependencies
              run: npm ci

            - name: Sync Doppler secrets to Cloudflare Workers
              run: |
                  doppler secrets --json \
                    | jq -c 'with_entries(.value = .value.computed)' \
                    | npx wrangler secret bulk --name vina-gallica
              env:
                  DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
                  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
                  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

            - name: Build
              run: doppler run -- npm run build
              env:
                  DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}

            - name: Deploy
              uses: cloudflare/wrangler-action@v3
              with:
                  apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
                  accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
                  command: deploy
